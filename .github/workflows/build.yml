name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create DEBIAN folder
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/lib
          cp control package/DEBIAN/
          echo "#!/bin/bash" > package/DEBIAN/postinst
          echo "echo 'Cheat installed'" >> package/DEBIAN/postinst
          chmod +x package/DEBIAN/postinst
      - name: Build .deb
        run: |
          dpkg-deb --build package standoff2cheat.deb
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: tweak-deb
          path: standoff2cheat.deb
