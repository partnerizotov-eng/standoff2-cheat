name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          sudo apt update
          sudo apt install -y git build-essential curl dpkg-dev
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
      - name: Build
        run: |
          cd $GITHUB_WORKSPACE
          make clean || true
          make package || true
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-deb
          path: ./packages/*.deb
